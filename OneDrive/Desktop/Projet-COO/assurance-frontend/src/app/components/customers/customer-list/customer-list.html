<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Liste des clients</h2>
    <a routerLink="/customers/new" class="btn btn-success"
       *ngIf="authService.isAdmin()">+ Nouveau client</a>
  </div>
  <div class="input-group mb-3">
    <input type="text" class="form-control"
           placeholder="Rechercher par nom..."
           [(ngModel)]="keyword" (input)="search()"/>
  </div>
  <table class="table table-striped table-bordered">
    <thead class="table-primary">
    <tr>
      <th>ID</th><th>Nom</th><th>Email</th>
      <th *ngIf="authService.isAdmin()">Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr *ngFor="let c of customer">
      <td>{{ c.id }}</td>
      <td>{{ c.name }}</td>
      <td>{{ c.email }}</td>
      <td>
        <a [routerLink]="['/customers/edit', c.id]"
           class="btn btn-sm btn-warning me-2">Modifier</a>
        <button class="btn btn-sm btn-danger"
                (click)="delete(c.id!)">Supprimer</button>
      </td>
    </tr>
    </tbody>
  </table>
</div>
